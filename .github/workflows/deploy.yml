name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python: gerar os JSONs estáticos ──────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate static JSON data
        run: python scripts/generate_static_data.py
        env:
          PYTHONPATH: .

      # ── Node.js: build do Next.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Next.js static export
        run: npm run build
        working-directory: frontend
        env:
          NODE_ENV: production

      # ── GitHub Pages: upload e deploy ─────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
